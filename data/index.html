    .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

    .metric span { color: var(--muted); font-size: 11px; }

    .legend-item.group::before { background: var(--violet); }

    .details table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }

    .details td { padding: 5px 0; vertical-align: top; word-break: break-word; }

    .images { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }

    .empty { color: var(--muted); font-style: italic; font-size: 13px; }

    }

  <script>
    const DATA = JSON.parse(document.getElementById('tree-data').textContent);
    const nodes = DATA.nodes || {};
    const rootId = DATA.rootId || 'root';
    const stage = document.getElementById('stage');
    const viewport = document.getElementById('viewport');
    const edgeSvg = document.getElementById('edges');
    const nodeLayer = document.getElementById('nodes');
    const details = document.getElementById('details');
    const statusEl = document.getElementById('status');
    const searchEl = document.getElementById('search');
    let scale = 0.86;
    let pan = {x: 48, y: 40};
    let positions = {};
    let selectedId = rootId;
    let collapsed = new Set();
    function defaultCollapsed() {
      return new Set(Object.values(nodes)
        .filter(n => (n.kind === 'group' || n.kind === 'class') && (n.children || []).length)
        .map(n => n.id));
    }
    collapsed = defaultCollapsed();

    function esc(text) {
      return String(text ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
    }
    function normalize(text) {
      return String(text || '').toLowerCase().replace(/[_-]+/g, ' ').trim();
    }
    function nodeText(node) {
      return normalize([node.name, node.cid, node.role, node.group, node.note].join(' '));
    }
    function query() { return normalize(searchEl.value); }
    function isMatch(id) {
      const q = query();
      if (!q) return false;
      const node = nodes[id];
      return !!node && nodeText(node).includes(q);
    }
    const matchCache = new Map();
    function hasMatch(id) {
      const q = query();
      if (!q) return true;
      if (matchCache.has(id)) return matchCache.get(id);
      const node = nodes[id];
      let ok = !!node && nodeText(node).includes(q);
      if (!ok && node) ok = (node.children || []).some(ch => hasMatch(ch));
      matchCache.set(id, ok);
      return ok;
    }
    function visibleChildren(id) {
      const node = nodes[id];
      if (!node) return [];
      const q = query();
      if (!q && collapsed.has(id)) return [];
      return (node.children || []).filter(ch => q ? hasMatch(ch) : true);
    }
    const NODE_W = 232;
    const NODE_H = 92;
    const COL_W = 304;
    const ROW_H = 118;
    function layout() {
      matchCache.clear();
      positions = {};
      let yCursor = 0;
      function walk(id, depth) {
        const children = visibleChildren(id);
        let y;
        if (!children.length) {
          y = yCursor;
          yCursor += ROW_H;
        } else {
          const childYs = children.map(ch => walk(ch, depth + 1));
          y = childYs.reduce((a, b) => a + b, 0) / childYs.length;
        }
        positions[id] = {x: depth * COL_W, y};
        return y;
      }
      walk(rootId, 0);
      return {width: Math.max(900, Math.max(...Object.values(positions).map(p => p.x), 0) + NODE_W + 60), height: Math.max(560, yCursor + NODE_H + 60)};
    }
    function roleClass(node) {
      return [node.kind || 'node', node.role || ''].join(' ').trim();
    }
    function render() {
      const bounds = layout();
      viewport.style.width = bounds.width + 'px';
      viewport.style.height = bounds.height + 'px';
      edgeSvg.setAttribute('width', bounds.width);
      edgeSvg.setAttribute('height', bounds.height);
      edgeSvg.innerHTML = '';
      nodeLayer.innerHTML = '';
      Object.entries(positions).forEach(([id, pos]) => {
        const node = nodes[id];
        const children = visibleChildren(id);
        children.forEach(ch => {
          const cp = positions[ch];
          if (!cp) return;
          const x1 = pos.x + NODE_W;
          const y1 = pos.y + NODE_H / 2;
          const x2 = cp.x;
          const y2 = cp.y + NODE_H / 2;
          const mid = x1 + Math.max(38, (x2 - x1) / 2);
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'edge');
          path.setAttribute('d', `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
          edgeSvg.appendChild(path);
        });
      });
      Object.entries(positions).forEach(([id, pos]) => {
        const node = nodes[id];
        const div = document.createElement('div');
        div.className = `node ${roleClass(node)}${(node.images || []).length ? ' has-thumb' : ''}${selectedId === id ? ' selected' : ''}${isMatch(id) ? ' match' : ''}`;
        div.style.left = pos.x + 'px';
        div.style.top = pos.y + 'px';
        const hasChildren = (node.children || []).length > 0;
        const closed = collapsed.has(id);
        const countText = node.kind === 'group'
          ? `${node.meta?.instance || 0} inst / ${node.meta?.classify || 0} cls / ${node.meta?.semantic || 0} sem`
          : node.role === 'instance'
            ? `${node.meta?.classifyCount || 0} classify`
            : node.role || node.kind;
        div.innerHTML = `
          <div class="node-title">${esc(node.cid !== null && node.cid !== undefined ? node.cid + ': ' + node.name : node.name)}</div>
          <div class="node-meta">
            <span class="pill">${esc(node.role || node.kind)}</span>
            ${node.group ? `<span class="pill">${esc(node.group)}</span>` : ''}
            <span class="pill">${esc(countText)}</span>
          </div>
          ${(node.images || []).length ? `<img class="node-thumb" src="${esc(node.images[0])}" alt="">` : ''}`;
        div.addEventListener('click', ev => {
          if (hasChildren) {
            if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
          }
          selectedId = id;
          render();
          showDetails(id);
        });
        nodeLayer.appendChild(div);
      });
      applyTransform();
      const visibleCount = Object.keys(positions).length;
      statusEl.textContent = `${visibleCount} visible nodes | zoom ${Math.round(scale * 100)}%`;
    }
    function showDetails(id) {
      const node = nodes[id] || nodes[rootId];
      const children = (node.children || []).length;
      const imageHtml = (node.images || []).length
        ? `<div class="images">${node.images.map(src => `<img src="${esc(src)}" alt="">`).join('')}</div>`
        : '<p class="empty">No illustration for this node.</p>';
      details.innerHTML = `
        <h2>${esc(node.cid !== null && node.cid !== undefined ? node.cid + ': ' + node.name : node.name)}</h2>
        <table>
          <tr><th>Role</th><td>${esc(node.role || node.kind)}</td></tr>
          <tr><th>Group</th><td>${esc(node.group || '-')}</td></tr>
          <tr><th>ID</th><td>${esc(node.cid ?? '-')}</td></tr>
          <tr><th>Children</th><td>${children}</td></tr>
          ${node.meta?.parentName ? `<tr><th>Parent</th><td>${esc(node.meta.parentId)}: ${esc(node.meta.parentName)}</td></tr>` : ''}
        </table>
        ${node.note ? `<div class="note">${esc(node.note)}</div>` : '<p class="empty">No note.</p>'}
        ${imageHtml}`;
    }
    function summary() {
      const s = DATA.summary || {};
      const items = [
        ['Projects', s.projects || 0],
        ['Groups', s.groups || 0],
        ['Instance', s.instance || 0],
        ['Classify', s.classify || 0],
        ['Semantic', s.semantic || 0],
        ['Unique IDs', s.uniqueIds || 0],
      ];
      document.getElementById('summaryGrid').innerHTML = items.map(([label, value]) => `<div class="metric"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`).join('');
    }
    function applyTransform() {
      viewport.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${scale})`;
    }
    function fitView() {
      const xs = Object.values(positions).map(p => p.x);
      const ys = Object.values(positions).map(p => p.y);
      const maxX = Math.max(...xs, 1) + 250;
      const maxY = Math.max(...ys, 1) + 120;
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      scale = Math.max(0.18, Math.min(1.15, Math.min((w - 60) / maxX, (h - 60) / maxY)));
      pan = {x: 28, y: 28};
      applyTransform();
      render();
    }
    function zoomAt(factor, cx = stage.clientWidth / 2, cy = stage.clientHeight / 2) {
      const rect = stage.getBoundingClientRect();
      const wx = (cx - rect.left - pan.x) / scale;
      const wy = (cy - rect.top - pan.y) / scale;
      const next = Math.max(0.12, Math.min(2.6, scale * factor));
      pan.x = cx - rect.left - wx * next;
      pan.y = cy - rect.top - wy * next;
      scale = next;
      render();
    }
    let drag = null;
    stage.addEventListener('mousedown', ev => {
      if (ev.target.closest('.node')) return;
      drag = {x: ev.clientX, y: ev.clientY, px: pan.x, py: pan.y};
      stage.classList.add('dragging');
    });
    window.addEventListener('mousemove', ev => {
      if (!drag) return;
      pan.x = drag.px + ev.clientX - drag.x;
      pan.y = drag.py + ev.clientY - drag.y;
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      drag = null;
      stage.classList.remove('dragging');
    });
    stage.addEventListener('wheel', ev => {
      ev.preventDefault();
      zoomAt(ev.deltaY < 0 ? 1.12 : 0.89, ev.clientX, ev.clientY);
    }, {passive: false});
    document.getElementById('zoomIn').onclick = () => zoomAt(1.16);
    document.getElementById('zoomOut').onclick = () => zoomAt(0.86);
    document.getElementById('fit').onclick = fitView;
    document.getElementById('expandAll').onclick = () => { collapsed.clear(); render(); };
    document.getElementById('collapseAll').onclick = () => {
      collapsed = defaultCollapsed();
      render();
    };
    document.getElementById('reset').onclick = () => {
      searchEl.value = '';
      selectedId = rootId;
      collapsed = defaultCollapsed();
      render();
      fitView();
      showDetails(rootId);
    };
    searchEl.addEventListener('input', () => {
      render();
      const first = Object.keys(positions).find(isMatch);
      if (first) {
        selectedId = first;
        showDetails(first);
      }
    });
    summary();
    render();
    fitView();
    showDetails(rootId);
  </script>
</body>
</html>
